name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pystray pyinstaller

      - name: Build exe with PyInstaller
        run: python -m PyInstaller keep_awake.py --onefile --noconsole --name keep_awake --exclude-module PIL --exclude-module Pillow --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        run: iscc keep_awake_setup.iss

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/keep_awake_setup.exe
          fail_on_unmatched_files: true
